spring:
  application:
    name: url-shortener
  datasource:
    url: jdbc:h2:mem:urlshortener
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

url-shortener:
  obfuscation-secret: ${URL_SHORTENER_SECRET:123456}
  base-url: ${URL_SHORTENER_BASE_PATH:https://short.lee/}

security:
  api-key: ${API_KEY:local-dev-api-key}

logging:
  level:
    root: INFO
    com.keterly.url_shortener: INFO


